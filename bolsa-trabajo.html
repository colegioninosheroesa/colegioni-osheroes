    <header class="hero"><div class="container"><h1>Únete a nuestro Equipo</h1></div></header>

    <section class="container mt-4 mb-5">
        <div class="form-container card-moderna p-4 shadow-sm">
            <form>
                <h4 style="color: var(--azul-id); margin-bottom: 20px;">Datos Personales</h4>
                <div class="row">
                    <div class="col-md-6 mb-3"><input type="text" class="form-control" placeholder="Nombre(s) *"></div>
                    <div class="col-md-6 mb-3"><input type="text" class="form-control" placeholder="Apellidos *"></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3"><input type="email" class="form-control" placeholder="Correo electrónico *"></div>
                    <div class="col-md-6 mb-3"><input type="tel" class="form-control" placeholder="Teléfono / WhatsApp *"></div>
                </div>

                <h4 class="mt-4" style="color: var(--azul-id); margin-bottom: 20px;">Perfil Profesional</h4>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="small font-weight-bold">Área de interés *</label>
                        <select class="form-control">
                            <option>Docencia Preescolar</option>
                            <option>Docencia Primaria</option>
                            <option>Docencia Secundaria / Preparatoria</option>
                            <option>Administración</option>
                            <option>Mantenimiento / Intendencia</option>
                            <option>Inglés / Idiomas</option>
                            <option>Extracurriculares / After School</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="small font-weight-bold">Último grado de estudios</label>
                        <input type="text" class="form-control" placeholder="Ej. Licenciatura en Educación">
                    </div>
                </div>

                <div class="row">
                    <div class="col-12 mb-3">
                        <label class="small font-weight-bold">Adjuntar CV (PDF o Word) *</label>
                        <div class="custom-file">
                            <input type="file" class="custom-file-input" id="customFile" accept=".pdf,.doc,.docx">
                            <label class="custom-file-label" for="customFile">Seleccionar archivo...</label>
                        </div>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-12">
                        <textarea class="form-control" rows="3" placeholder="Cuéntanos brevemente sobre tu experiencia..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-institucional mt-4">Enviar Postulación</button>
            </form>
        </div>
    </section>

<style>

        font-size: 0.95rem; /* Ajuste ligero de tamaño para asegurar espacio */
    }

    .link-unete {
        color: white !important;
        font-weight: 600;
        text-decoration: none;

        transition: all 0.3s ease;
