    <header class="hero"><div class="container"><h1>Informes e Inscripciones</h1></div></header>

        <div class="form-container">
            <form>
                <h4 style="color: var(--azul-id); margin-bottom: 20px;">Información del Alumno</h4>
                <div class="row">
                    <div class="col-md-6"><input type="text" class="form-control" placeholder="Nombre(s) *"></div>
                    <div class="col-md-3"><input type="text" class="form-control" placeholder="Primer apellido"></div>
                    <div class="col-md-3"><input type="text" class="form-control" placeholder="Segundo apellido"></div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <label class="small font-weight-bold">Grado al que aspira *</label>
                        <select class="form-control">
                            <option>Maternal</option>
                            <option>Preescolar</option>
                            <option>Primaria</option>
                            <option>Secundaria</option>
                            <option>Preparatoria</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="small font-weight-bold">Ciclo escolar</label>
                        <select class="form-control">
                            <option>2026-2027</option><option>2027-2028</option><option>2028-2029</option>
                            <option>2029-2030</option><option>2030-2031</option><option>2031-2032</option>
                            <option>2032-2033</option><option>2033-2034</option><option>2034-2035</option>
                            <option>2035-2036</option>
                        </select>
                    </div>
                </div>
                <h4 class="mt-4" style="color: var(--azul-id); margin-bottom: 20px;">Padre o Tutor</h4>
                <div class="row">
                    <div class="col-md-6"><input type="text" class="form-control" placeholder="Nombre"></div>
                    <div class="col-md-6"><input type="text" class="form-control" placeholder="Apellidos"></div>
                    <div class="col-md-6"><input type="email" class="form-control" placeholder="Email"></div>
                    <div class="col-md-6"><input type="tel" class="form-control" placeholder="WhatsApp *"></div>
                </div>
                <button type="submit" class="btn-institucional mt-3">Enviar</button>
            </form>
        </div>
    </section>
